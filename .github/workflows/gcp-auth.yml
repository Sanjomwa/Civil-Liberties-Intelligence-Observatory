name: GCP Auth (WIF)

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  verify-gcp-auth:
    name: Verify Workload Identity Federation auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/245097041714/locations/global/workloadIdentityPools/clio-dev/providers/github'
          service_account: 'bruin-ci@encoded-joy-485413-k5.iam.gserviceaccount.com'
